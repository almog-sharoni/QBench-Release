services:
  qbench:
    build:
      context: .
      dockerfile: dockerfile
    image: qbench:latest
    container_name: qbench
    working_dir: /app
    command: /bin/bash
    stdin_open: true
    tty: true
    shm_size: 32gb
    mem_limit: 64gb
    gpus: all
    user: "${UID:-1000}:${GID:-1000}"
    ulimits:
      nofile:
        soft: 524288
        hard: 524288
    environment:
      HOME: /tmp
      PYTHONUNBUFFERED: "1"
      PYTHONNOUSERSITE: "1"
      TORCH_HOME: /app/.cache/torch
      PYTORCH_KERNEL_CACHE_PATH: /app/.cache/torch/kernels
      TORCH_CUDA_ARCH_LIST: 12.1a


    volumes:
      - ./:/app
      - ${IMAGENET_HOST_PATH:-/data/shared_data/imagenet}:/data/imagenet
      - ${SCANNET_HOST_PATH:-/data/shared_data/scannet}:/data/scannet:ro
