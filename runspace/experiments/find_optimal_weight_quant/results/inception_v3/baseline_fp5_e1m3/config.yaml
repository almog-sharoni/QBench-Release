adapter:
  input_quantization: false
  quantized_ops:
  - '-1'
  type: generic
dataset:
  batch_size: 32
  name: imagenet
  num_workers: 32
  path: /data/imagenet/val
evaluation:
  mode: evaluate
model:
  name: inception_v3
  weights: DEFAULT
output_name: baseline_fp5_e1m3
quantization:
  format: fp5_e1m3
  weight_chunk_size: 128
  weight_mode: chunk
