adapter:
  input_quantization: false
  quantized_ops:
  - '-1'
  type: generic
dataset:
  batch_size: 32
  name: imagenet
  num_workers: 32
  path: /data/imagenet/val
evaluation:
  max_batches: 1
  mode: evaluate
model:
  name: resnet18
  weights: DEFAULT
output_name: baseline_fp8_e4m3
quantization:
  format: fp8_e4m3
  weight_chunk_size: 128
  weight_mode: chunk
