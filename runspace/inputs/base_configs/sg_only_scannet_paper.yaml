target_pipeline: superpoint_superglue

adapter:
  type: feature_matching
  quantize_components: ["superglue"]
  quantized_ops: ["all"]
  weight_quantization: true
  input_quantization: true

quantization:
  format: fp8_e4m3
  weight_mode: channel
  calib_method: max
  strict_format_check: true

# Paper-aligned ScanNet benchmark: SuperGlue's own test pairs
# (assets/scannet_test_pairs_with_gt.txt) covering all 100 test scenes.
# Yields the full 1500 paper pairs.
dataset:
  name: scannet_pairs
  path: /data/scannet
  pairs_file: /app/runspace/inputs/scannet/pairs_test_paper_100scenes.txt
  image_size: [480, 640]
  batch_size: 1
  num_workers: 8
  max_pairs: 1500

model:
  sp_config:
    max_keypoints: 1024

evaluation:
  mode: compare
  save_visualizations: true
  num_viz_samples: 5
  compare_batches: -1
  max_batches: -1
