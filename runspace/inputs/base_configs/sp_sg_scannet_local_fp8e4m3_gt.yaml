target_pipeline: superpoint_superglue

adapter:
  type: feature_matching
  quantized_ops: ["all"]
  weight_quantization: true
  input_quantization: true

quantization:
  format: fp8_e4m3
  weight_mode: channel
  calib_method: max

dataset:
  name: scannet_pairs
  path: /data/scannet/posed_images
  pairs_file: /app/runspace/inputs/scannet/pairs_val_1500.txt
  image_size: [480, 640]
  batch_size: 1
  num_workers: 8
  max_pairs: 1500

evaluation:
  mode: compare
  save_visualizations: true
  num_viz_samples: 1500
  compare_batches: -1
