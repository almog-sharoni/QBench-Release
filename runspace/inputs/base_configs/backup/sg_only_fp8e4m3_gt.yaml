target_pipeline: superpoint_superglue

adapter:
  type: feature_matching
  quantize_components: ["superglue"]
  quantized_ops: ["Conv1d"]
  weight_quantization: true
  input_quantization: false

quantization:
  format: fp8_e4m3
  weight_mode: channel
  calib_method: max

dataset:
  name: scannet_pairs
  path: ../custom/SuperGluePretrainedNetwork/assets/scannet_sample_images
  pairs_file: ../custom/SuperGluePretrainedNetwork/assets/scannet_sample_pairs_with_gt.txt
  image_size: [480, 640]
  batch_size: 1
  num_workers: 0

evaluation:
  mode: compare
  compare_batches: 15
