target_pipeline: superpoint_superglue

adapter:
  type: feature_matching
  quantized_ops: ["all"]
  weight_quantization: true
  input_quantization: true

quantization:
  format: fp8_e4m3
  weight_mode: channel
  calib_method: max
  strict_format_check: true

dataset:
  name: scannet_pairs
  path: /data/scannet/ref
  pairs_file: /app/runspace/inputs/scannet/pairs_test_paper_100subset.txt
  image_size: [480, 640]
  batch_size: 1
  num_workers: 0
  max_pairs: 100

model:
  sp_config:
    max_keypoints: 1024

evaluation:
  mode: compare
  save_visualizations: false
  num_viz_samples: 0
  compare_batches: -1
  max_batches: -1
